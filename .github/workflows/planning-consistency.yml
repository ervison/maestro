name: Planning Consistency

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  planning-consistency:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e .[dev]

      - name: Run planning consistency CLI gate
        run: maestro planning check

      - name: Run planning consistency tests
        run: pytest tests/test_planning_consistency.py tests/test_cli_planning.py -q
